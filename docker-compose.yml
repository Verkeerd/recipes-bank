version: "3.9"

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+psycopg2://recipe_user:recipe_pass@db:5432/recipe_db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "python -m app.scripts.set_up && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  pgdata: